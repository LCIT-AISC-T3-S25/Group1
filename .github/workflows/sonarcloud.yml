name: SonarCloud

on:
  push:
    branches:
      - test

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r Deployment/gru_sentiment_api/requirements.txt || true
          pip install -r ui_app/requirements.txt || true

      - name: Run SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.projectKey=LCIT-AISC-T3-S25_Group1
            -Dsonar.organization=lcit-aisc-t3-s25
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
